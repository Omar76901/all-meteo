name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Installa dipendenze (lockfile bloccato)
        run: npm ci

      - name: Audit sicurezza
        run: npm audit --audit-level=high

      - name: Typecheck
        run: npx tsc -b

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
